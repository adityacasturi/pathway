name: PR checks

on:
  pull_request:
    branches: [main, dev]

jobs:
  verify:
    name: PR checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run test:preprod:full
