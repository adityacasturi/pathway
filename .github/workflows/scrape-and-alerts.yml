name: Scrape and alerts

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-and-alerts
  cancel-in-progress: false

permissions:
  contents: read

env:
  SCRAPE_SHARD_COUNT: "5"
  SCRAPE_COMPANY_CONCURRENCY: "16"

jobs:
  scrape:
    name: Scrape shard ${{ matrix.shard }}/5
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_SHARD_INDEX: ${{ matrix.shard }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run scrape

  alerts:
    name: Send instant alerts
    needs: scrape
    # Run after scrape finishes even when one or more shards fail; only skip on cancel.
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      ALERT_UNSUBSCRIBE_SECRET: ${{ secrets.ALERT_UNSUBSCRIBE_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run alerts:instant
