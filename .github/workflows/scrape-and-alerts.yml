name: Scrape and alerts

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: scrape-and-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape-and-alerts:
    name: Scrape postings and send instant alerts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      ALERT_UNSUBSCRIBE_SECRET: ${{ secrets.ALERT_UNSUBSCRIBE_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run scrape
      - run: npm run alerts:instant
